packages:
  - .

minimumReleaseAge: 10080
trustPolicy: no-downgrade
# semver@6.3.1 is a 2023 ReDoS-fix backport published without provenance after
# semver 7.x gained it — a known-benign trust "downgrade" by publish date.
trustPolicyExclude:
  - semver
  # c12@3, pulled by trigger.dev tooling, requires chokidar ^4.0.3; chokidar
  # 5 has provenance but is outside the declared compatible range.
  - chokidar
  # react-doctor@0.4.0 pins effect v4 beta tooling; current react-doctor
  # releases are still inside the 7-day minimumReleaseAge window.
  - effect
  - "@effect/platform-node-shared"

# Postinstall scripts stay blocked (each verified unnecessary): esbuild,
# @depot/cli, unrs-resolver, and msgpackr-extract all ship their native
# binaries via platform-specific optional deps (the scripts are fallback
# downloaders/compilers); @clerk/shared's script only prints a telemetry
# notice; protobufjs's script only generates optional CLI artifacts.
ignoredBuiltDependencies:
  - esbuild
  - protobufjs
  - "@depot/cli"
  - "@clerk/shared"
  - unrs-resolver
  - msgpackr-extract

# Security overrides for vulnerable transitive dependencies (pnpm audit).
# Scoped by major version where multiple majors coexist in the tree.
overrides:
  shell-quote: ^1.8.4 # GHSA-w7jw-789q-3m8p (critical) via @daytona/sdk
  # node-tar path traversal advisories via trigger.dev>giget. giget@1 pins
  # tar@6 (unpatched major); it only uses `extract`, which tar@7 keeps.
  tar: ^7.5.11
  systeminformation: ^5.31.6 # command injection advisories via @opentelemetry/host-metrics
  "@grpc/grpc-js": ^1.14.4 # GHSA via @daytona/sdk otel exporters
  "@opentelemetry/sdk-node": ^0.217.0 # GHSA-q7rr-3cgh-j5r3 (prometheus exporter crash)
  "@opentelemetry/exporter-prometheus": ^0.217.0 # GHSA-q7rr-3cgh-j5r3
  hono: ^4.12.21 # JWT validation advisories via @modelcontextprotocol/sdk
  "ws@8": ^8.20.1 # via socket.io>engine.io
  "cookie@0": ^0.7.2 # GHSA via engine.io
  fast-uri: ^3.1.2 # via atmn>conf>ajv
  "qs@6": ^6.15.2 # via @modelcontextprotocol/sdk>express
  ip-address: ^10.1.1 # via @modelcontextprotocol/sdk>express-rate-limit
  "brace-expansion@5": ^5.0.6 # ReDoS via eslint tooling
  "js-cookie@3": ^3.0.7 # via @clerk/shared
  "postcss@8": ^8.5.10 # parsing advisory via next
  reselect: ^5.2.0 # no-downgrade trust policy blocks older 5.1.1 via @base-ui/utils
  "protobufjs@7": ^7.5.8 # via react-doctor>@sentry/node
  "protobufjs@8": ^8.0.2 # DoS advisories via react-doctor>@sentry/node (otlp-transformer)
  "trigger.dev>esbuild": ^0.25.0 # GHSA-67mh-4wv8-2f99 via trigger.dev dev server tooling
  # 3.10.1 dropped provenance attestation (trustPolicy no-downgrade rejects it);
  # 4.4.x restores SLSA provenance. Lint-only tooling via eslint-config-next.
  eslint-import-resolver-typescript: ^4.4.3

allowBuilds:
  "@clerk/shared": set this to true or false
  "@depot/cli": set this to true or false
  esbuild: set this to true or false
  msgpackr-extract: set this to true or false
  msw: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
  unicode-animations: set this to true or false
  unrs-resolver: set this to true or false
